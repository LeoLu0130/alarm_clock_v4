<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI 鬧鐘 V5.0</title>
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; margin: 0; padding: 15px; background: #f4f4f9; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 15px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        #calendar { background: #fff; padding: 10px; border-radius: 10px; border: 1px solid #eee; }
        .btn { border: none; padding: 12px; border-radius: 10px; cursor: pointer; font-weight: bold; }
        .btn-sync { background: #ff9500; color: white; width: 100%; margin-top: 10px; }
        .btn-list { background: #007aff; color: white; width: 100%; margin-top: 10px; }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; }
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 25px; border-radius: 20px; z-index: 1001; width: 80%; max-width: 300px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .todo-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid #eee; }
        .btn-del { background: #ff3b30; color: white; padding: 6px 12px; border-radius: 8px; }
    </style>
</head>
<body>

<div class="container" id="mainPage">
    <div class="header"><h2 style="margin:0;">📅 AI 鬧鐘 V5</h2></div>
    <div id="calendar"></div>
    <button class="btn btn-sync" onclick="syncToShortcuts()">同步鬧鐘</button>
    <button class="btn btn-list" onclick="showListPage()">📋 管理清單</button>
</div>

<div class="container" id="listPage" style="display:none;">
    <button class="btn" style="background:#eee;" onclick="showMainPage()">← 返回</button>
    <div id="fullTodoList"></div>
</div>

<div class="modal-overlay" id="overlay" onclick="closeModal()"></div>
<div class="modal" id="modal">
    <h3 id="mDate">新增行程</h3>
    <input type="text" id="mTitle" placeholder="要做什麼？">
    <input type="time" id="mTime" value="09:00">
    <button class="btn btn-list" onclick="saveEvent()">儲存</button>
</div>

<script>
    let calendar;
    let events = JSON.parse(localStorage.getItem('alarms') || '[]');
    let selDate = "";

    function initCalendar() {
        calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
            initialView: 'dayGridMonth', locale: 'zh-tw', height: 'auto',
            dateClick: function(info) {
                selDate = info.dateStr;
                document.getElementById('mDate').innerText = selDate;
                document.getElementById('modal').style.display = 'block';
                document.getElementById('overlay').style.display = 'block';
            }
        });
        calendar.addEventSource(events);
        calendar.render();
    }

    function saveEvent() {
        const title = document.getElementById('mTitle').value || "提醒";
        const time = document.getElementById('mTime').value;
        events.push({ id: Date.now().toString(), title: title, start: selDate + "T" + time });
        localStorage.setItem('alarms', JSON.stringify(events));
        location.reload();
    }

    function deleteEv(id) {
        events = events.filter(e => e.id !== id);
        localStorage.setItem('alarms', JSON.stringify(events));
        location.reload();
    }

    function showListPage() {
        document.getElementById('mainPage').style.display = 'none';
        document.getElementById('listPage').style.display = 'block';
        const listEl = document.getElementById('fullTodoList');
        listEl.innerHTML = events.map(ev => `
            <div class="todo-item">
                <div><strong>${ev.title}</strong><br><small>${ev.start}</small></div>
                <button class="btn btn-del" onclick="deleteEv('${ev.id}')">刪除</button>
            </div>`).join('');
    }

    function showMainPage() { location.reload(); }
    function closeModal() { document.getElementById('modal').style.display = 'none'; document.getElementById('overlay').style.display = 'none'; }

    function syncToShortcuts() {
        const now = new Date();
        // 將格式轉換為 JSON 字串
        const data = events.filter(e => new Date(e.start) >= now).map(e => {
            const d = new Date(e.start);
            const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
            return {
                name: e.title,
                time: d.getHours().toString().padStart(2,'0') + ":" + d.getMinutes().toString().padStart(2,'0'),
                day: days[d.getDay()]
            };
        });
        
        if(data.length === 0) { alert("沒行程"); return; }
        // 傳送整串 JSON
        window.location.href = "shortcuts://run-shortcut?name=SyncAlarms&input=text&text=" + encodeURIComponent(JSON.stringify(data));
    }

    window.onload = initCalendar;
</script>
</body>
</html>
