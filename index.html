<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 鬧鐘 V4.2 - 自動感應日期版</title>
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; margin: 0; padding: 20px; background: #f4f4f9; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { color: #333; display: flex; justify-content: space-between; align-items: center; }
        #calendar { margin-top: 20px; min-height: 500px; }
        .btn-sync { background: #007aff; color: white; border: none; padding: 10px 20px; border-radius: 8px; font-size: 14px; cursor: pointer; }
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 20px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); z-index: 1000; width: 80%; max-width: 300px; }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 999; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        .date-display { font-size: 14px; color: #666; margin-bottom: 10px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>
        我的行程表
        <button class="btn-sync" onclick="syncToShortcuts()">同步本週鬧鐘</button>
    </h2>
    <div id="calendar"></div>
</div>

<div class="modal-overlay" id="overlay"></div>
<div class="modal" id="modal">
    <h3>新增提醒</h3>
    <div class="date-display" id="dateDisplay"></div> <input type="text" id="eventTitle" placeholder="要做什麼？">
    <label style="font-size: 12px; color: #888;">請選擇時間：</label>
    <input type="time" id="eventTimeOnly"> <div style="display: flex; justify-content: flex-end; gap: 10px; margin-top: 10px;">
        <button onclick="closeModal()">取消</button>
        <button style="background:#007aff; color:white; border:none; padding:5px 15px; border-radius:5px;" onclick="saveEvent()">儲存</button>
    </div>
</div>

<script>
    let calendar;
    let events = JSON.parse(localStorage.getItem('alarms') || '[]');
    let selectedDateStr = "";

    document.addEventListener('DOMContentLoaded', function() {
        const calendarEl = document.getElementById('calendar');
        calendar = new FullCalendar.Calendar(calendarEl, {
            initialView: 'dayGridMonth',
            locale: 'zh-tw',
            events: events,
            dateClick: function(info) {
                selectedDateStr = info.dateStr; // 系統自動記住你點的日期
                openModal(info.dateStr);
            }
        });
        calendar.render();
    });

    function openModal(date) {
        document.getElementById('modal').style.display = 'block';
        document.getElementById('overlay').style.display = 'block';
        document.getElementById('dateDisplay').innerText = "已選日期：" + date;
        document.getElementById('eventTimeOnly').value = "09:00";
    }

    function closeModal() {
        document.getElementById('modal').style.display = 'none';
        document.getElementById('overlay').style.display = 'none';
    }

    function saveEvent() {
        const title = document.getElementById('eventTitle').value || "提醒";
        const timeOnly = document.getElementById('eventTimeOnly').value;
        if (selectedDateStr && timeOnly) {
            const fullDateTime = selectedDateStr + "T" + timeOnly;
            const newEvent = { title: title, start: fullDateTime, allDay: false };
            events.push(newEvent);
            localStorage.setItem('alarms', JSON.stringify(events));
            calendar.addEvent(newEvent);
            closeModal();
            document.getElementById('eventTitle').value = "";
        }
    }

    function syncToShortcuts() {
        const now = new Date();
        const endOfWeek = new Date();
        endOfWeek.setDate(now.getDate() + 7);

        const thisWeekTasks = events.filter(ev => {
            const taskDate = new Date(ev.start);
            return taskDate >= now && taskDate <= endOfWeek;
        });

        if (thisWeekTasks.length === 0) {
            alert("本週沒有任務需要同步！");
            return;
        }

        const taskData = thisWeekTasks.map(t => {
            const d = new Date(t.start);
            const timeStr = `${d.getHours().toString().padStart(2, '0')}:${d.getMinutes().toString().padStart(2, '0')}`;
            const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
            const dayName = days[d.getDay()]; // 系統自動計算星期幾
            return `${t.title}|${timeStr}|${dayName}`;
        }).join(';');

        window.location.href = "shortcuts://run-shortcut?name=SyncAlarms&input=text&text=" + encodeURIComponent(taskData);
    }
</script>

</body>
</html>
