<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI 鬧鐘 V4.4</title>
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; margin: 0; padding: 15px; background: #f4f4f9; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 15px; border-radius: 15px; shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        #calendar { background: #fff; padding: 10px; border-radius: 10px; border: 1px solid #eee; }
        .btn { border: none; padding: 10px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-sync { background: #007aff; color: white; }
        .btn-list { background: #5856d6; color: white; }
        /* 彈窗樣式 */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; }
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 20px; border-radius: 15px; z-index: 1001; width: 85%; max-width: 350px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .todo-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid #eee; }
        .btn-del { background: #ff3b30; color: white; padding: 5px 10px; border-radius: 5px; font-size: 12px; }
    </style>
</head>
<body>

<div class="container" id="mainPage">
    <div class="header">
        <button class="btn btn-list" onclick="showListPage()">查看清單</button>
        <button class="btn btn-sync" onclick="syncToShortcuts()">同步鬧鐘</button>
    </div>
    <div id="calendar"></div>
</div>

<div class="container" id="listPage" style="display:none;">
    <div class="header">
        <button class="btn" onclick="showMainPage()">← 返回日曆</button>
        <h3>所有待辦事項</h3>
    </div>
    <div id="fullTodoList"></div>
</div>

<div class="modal-overlay" id="overlay"></div>
<div class="modal" id="modal">
    <h3 id="mDate">新增</h3>
    <input type="text" id="mTitle" placeholder="要做什麼？">
    <input type="time" id="mTime" value="09:00">
    <div style="display:flex; justify-content:flex-end; gap:10px;">
        <button class="btn" onclick="closeModal()">取消</button>
        <button class="btn btn-sync" onclick="saveEvent()">儲存</button>
    </div>
</div>

<script>
    let calendar;
    let events = JSON.parse(localStorage.getItem('alarms') || '[]');
    let selDate = "";

    window.onload = function() {
        const calendarEl = document.getElementById('calendar');
        calendar = new FullCalendar.Calendar(calendarEl, {
            initialView: 'dayGridMonth',
            locale: 'zh-tw',
            height: 'auto',
            dateClick: function(info) {
                selDate = info.dateStr;
                document.getElementById('mDate').innerText = selDate;
                document.getElementById('modal').style.display = 'block';
                document.getElementById('overlay').style.display = 'block';
            }
        });
        calendar.addEventSource(events);
        calendar.render();
    };

    function saveEvent() {
        const title = document.getElementById('mTitle').value || "提醒";
        const time = document.getElementById('mTime').value;
        const newEv = { id: Date.now().toString(), title: title, start: selDate + "T" + time };
        events.push(newEv);
        localStorage.setItem('alarms', JSON.stringify(events));
        calendar.addEvent(newEv);
        closeModal();
    }

    function closeModal() { document.getElementById('modal').style.display = 'none'; document.getElementById('overlay').style.display = 'none'; }
    function showListPage() { 
        document.getElementById('mainPage').style.display = 'none'; 
        document.getElementById('listPage').style.display = 'block';
        renderFullList();
    }
    function showMainPage() { 
        document.getElementById('mainPage').style.display = 'block'; 
        document.getElementById('listPage').style.display = 'none';
    }

    function renderFullList() {
        const listEl = document.getElementById('fullTodoList');
        listEl.innerHTML = events.length ? "" : "暫無資料";
        events.sort((a,b) => new Date(a.start) - new Date(b.start)).forEach(ev => {
            const d = new Date(ev.start);
            listEl.innerHTML += `
                <div class="todo-item">
                    <div><strong>${ev.title}</strong><br><small>${d.toLocaleString()}</small></div>
                    <button class="btn btn-del" onclick="deleteEv('${ev.id}')">刪除</button>
                </div>`;
        });
    }

    function deleteEv(id) {
        events = events.filter(e => e.id !== id);
        localStorage.setItem('alarms', JSON.stringify(events));
        location.reload(); // 簡單處理：刪除後刷新
    }

    function syncToShortcuts() {
        const now = new Date();
        const data = events.filter(e => new Date(e.start) >= now).map(e => {
            const d = new Date(e.start);
            const t = d.getHours().toString().padStart(2,'0') + ":" + d.getMinutes().toString().padStart(2,'0');
            const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
            return `${e.title}|${t}|${days[d.getDay()]}`;
        }).join(';');
        if(!data) { alert("沒任務"); return; }
        window.location.href = "shortcuts://run-shortcut?name=SyncAlarms&input=text&text=" + encodeURIComponent(data);
    }
</script>
</body>
</html>
